<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>&nbsp;</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; overflow: hidden; }

    /* Background video, scaled to cover the whole viewport */
    .bg-wrap { position: fixed; inset: 0; overflow: hidden; z-index: 0; background: #000; }
    #bg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 100vw; height: 56.25vw;      /* 16:9 */
      min-height: 100vh; min-width: 177.78vh;
      border: 0;
      pointer-events: none;
    }

    /* Dim layer so the reveal text reads over the video */
    .dim { position: fixed; inset: 0; z-index: 1; background: rgba(0,0,0,0.55); }

    .stage {
      position: fixed; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 1.5rem;
    }

    .msg {
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      text-shadow: 0 2px 24px rgba(0,0,0,0.85);
      will-change: opacity;
    }

    #msg2 {
      font-size: clamp(2.2rem, 11vw, 8rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #msg2.show { opacity: 1; }

    /* Opaque black cover: hides the video (and its thumbnail) until the reveal */
    .cover {
      position: fixed; inset: 0; z-index: 3;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 1.5rem;
      transition: opacity 1.1s ease;
    }
    .cover.revealed { opacity: 0; pointer-events: none; }

    #msg1 {
      font-size: clamp(1.4rem, 5vw, 3rem);
      font-weight: 500;
      letter-spacing: 0.02em;
      opacity: 0;
      animation: fadeIn 1s ease 0.3s forwards;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

  <div class="bg-wrap"><div id="bg"></div></div>
  <div class="dim"></div>

  <div class="stage">
    <div class="msg" id="msg2">LETSGETTACOS</div>
  </div>

  <!-- Opaque cover shown first so the paused thumbnail is never seen -->
  <div class="cover" id="cover">
    <div class="msg" id="msg1">turn the volume up</div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
  (function () {
    var VIDEO_ID = 'dQw4w9WgXcQ';
    var DELAY_MS = 5000;   // time to turn the volume up before the reveal
    var player = null;
    var cover  = document.getElementById('cover');
    var msg2   = document.getElementById('msg2');
    var revealed = false;

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('bg', {
        videoId: VIDEO_ID,
        playerVars: {
          autoplay: 1,          // starts immediately, but MUTED and hidden behind the cover
          mute: 1,              // muted autoplay is always allowed, so playback is reliable
          controls: 0,
          disablekb: 1,
          fs: 0,
          rel: 0,
          modestbranding: 1,
          playsinline: 1,
          loop: 1,
          playlist: VIDEO_ID
        },
        events: {
          onReady: function () {
            // Reveal automatically after the delay. No click, nothing to tip them off.
            setTimeout(reveal, DELAY_MS);
          }
        }
      });
    };

    function unmute() {
      if (!player || !player.unMute) return;
      try { player.unMute(); player.setVolume(100); player.playVideo(); } catch (err) {}
    }

    function reveal() {
      if (revealed) return;
      revealed = true;
      unmute();                       // bring the sound in as the cover lifts
      cover.classList.add('revealed');
      msg2.classList.add('show');
    }

    // Silent safety net: if the browser held the sound muted, any stray
    // interaction unmutes it. No on-screen prompt, so nothing is given away.
    ['pointerdown', 'keydown', 'touchstart', 'click'].forEach(function (ev) {
      document.addEventListener(ev, unmute, { passive: true });
    });
  })();
  </script>
</body>
</html>

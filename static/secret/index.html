<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>TRASH CATT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: "Comic Sans MS", "Courier New", monospace;
      overflow-x: hidden;
    }

    /* Starfield */
    .stars {
      position: fixed;
      inset: 0;
      background: #05010f;
      z-index: -2;
    }
    .stars::before,
    .stars::after {
      content: "";
      position: absolute;
      inset: -50%;
      background-image:
        radial-gradient(2px 2px at 20px 30px, #fff, transparent),
        radial-gradient(2px 2px at 120px 80px, #fff, transparent),
        radial-gradient(1px 1px at 200px 160px, #fff, transparent),
        radial-gradient(2px 2px at 300px 50px, #fff, transparent),
        radial-gradient(1px 1px at 380px 220px, #fff, transparent),
        radial-gradient(2px 2px at 460px 120px, #fff, transparent);
      background-repeat: repeat;
      background-size: 500px 300px;
      animation: drift 6s linear infinite;
      opacity: 0.8;
    }
    .stars::after { background-size: 350px 220px; animation-duration: 3.5s; opacity: 0.5; }
    @keyframes drift {
      from { transform: translateX(0); }
      to   { transform: translateX(-500px); }
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem;
      gap: 2rem;
    }

    /* Blinking white/black header */
    .trashcatt {
      font-size: clamp(2.5rem, 12vw, 7rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      line-height: 1;
      padding: 0.25em 0.5em;
      animation: blink 0.7s steps(1, end) infinite;
    }
    @keyframes blink {
      0%, 49%   { background: #fff; color: #000; }
      50%, 100% { background: #000; color: #fff; }
    }

    /* Nyan cat with rainbow trail */
    .nyan {
      position: relative;
      width: 320px;
      max-width: 90vw;
      height: 96px;
      animation: bob 0.4s ease-in-out infinite alternate;
    }
    @keyframes bob {
      from { transform: translateY(-6px); }
      to   { transform: translateY(6px); }
    }
    .rainbow {
      position: absolute;
      top: 50%;
      left: 0;
      width: 200px;
      height: 60px;
      transform: translateY(-50%);
    }
    .rainbow span {
      display: block;
      height: 10px;
      animation: flow 0.3s steps(2) infinite;
    }
    .rainbow span:nth-child(1) { background: #ff0000; }
    .rainbow span:nth-child(2) { background: #ff9900; }
    .rainbow span:nth-child(3) { background: #ffff00; }
    .rainbow span:nth-child(4) { background: #33cc33; }
    .rainbow span:nth-child(5) { background: #3366ff; }
    .rainbow span:nth-child(6) { background: #9933cc; }
    @keyframes flow {
      from { transform: translateX(0); }
      to   { transform: translateX(-10px); }
    }
    .cat {
      position: absolute;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      font-size: 64px;
      line-height: 1;
    }

    .placeholder {
      max-width: 640px;
      font-size: 1.1rem;
      line-height: 1.7;
      color: #d9c7ff;
      opacity: 0.85;
    }
    .placeholder code {
      background: rgba(255,255,255,0.1);
      padding: 0.1em 0.4em;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <div class="wrap">
    <h1 class="trashcatt">TRASH CATT</h1>

    <div class="nyan" aria-hidden="true">
      <div class="rainbow">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <div class="cat">&#128049;</div>
    </div>

    <p class="placeholder">
      You found the secret. Content goes here. Tell me what you want on this page and I will drop it in.
    </p>
  </div>
</body>
</html>
